<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles/css/style.css" />
  </head>

  <body>
    <div id="header-placeholder"></div>
    <div class="search-placeholder">
      <div class="mobile-search">
        <input type="search" placeholder="What do you want to play?" />
        <img
          src="./assets/header_icons/Ellipse 11.png"
          alt="Search"
          class="search-icon"
        />
      </div>
      <img src="./assets/topimgs/icons big.png" alt="photo" />
    </div>
    <main>
      <!-- <div id="sidebar-placeholder"></div> -->
      <section class="main-search-section">
        <div class="Recent_searches" >
          <div class="direction_icon">
            <h3>Recent searches</h3>
            <img src="./assets/topimgs/Frame 76.png" alt="frame icons" />
          </div>
          <div class="artists_container">
            <div class="artists">
              <div class="circled_img">
                <img
                  class="daft_Punk"
                  src="./assets/topimgs/image 3.png"
                  alt="Daft Punk"
                />
                <img
                  class="icon_close"
                  src="./assets/topimgs/icons_big.png"
                  alt="icon"
                />
              </div>
              <p>Daft Punk</p>
            </div>
            <div class="artists">
              <div class="circled_img">
                <img
                  class="daft_Punk"
                  src="./assets/topimgs/image 4.png"
                  alt="David Bowie"
                />
                <img
                  class="icon_close"
                  src="./assets/topimgs/icons_big.png"
                  alt="icon"
                />
              </div>
              <p>David Bowie</p>
            </div>
            <div class="Black_Holes_card">
              <div class="square_img">
                <img
                  class="Black_Holes"
                  src="./assets/topimgs/image 4 (1).png"
                  alt="Black Holes..."
                />
                <img
                  class="icon_close_square"
                  src="./assets/topimgs/icons_big.png"
                  alt="icon"
                />
              </div>
              <p>Black Holes...</p>
              <span>Muse</span>
            </div>
          </div>
        </div>

        <section class="category_card">
          <h2 class="main-title">Browse all</h2>
          <div class="direction_icon">
            <h3 class="sub-title">Discover</h3>
            <img src="./assets/discover/Frame 76.png" alt="frame icons" />
          </div>
          <div class="cards_grid">
            <div class="category-card">
              <span class="category-name">Made For You</span>
              <img
                class="card-image"
                src="./assets/discover/image 2.png"
                alt="Made For You"
              />
            </div>
            <div class="category-card color-orange">
              <span class="category-name">New Releases</span>
              <img
                class="card-image"
                src="./assets/discover/image 13.png"
                alt="New Releases"
              />
            </div>
            <div class="category-card">
              <span class="category-name">Spotify Classics</span>
              <img
                class="card-image"
                src="./assets/discover/image 13 (1).png"
                alt="Spotify Classics"
              />
            </div>
            <div class="category-card color-blue">
              <span class="category-name">Charts</span>
              <img
                class="card-image"
                src="./assets/discover/image 13 (2).png"
                alt="Charts"
              />
            </div>
            <div class="category-card purple-color">
              <span class="category-name">Trending</span>
              <img
                class="card-image"
                src="./assets/discover/image 13 (3).png"
                alt="Trending"
              />
            </div>
            <div class="category-card color-blue">
              <span class="category-name">Discover</span>
              <img
                class="card-image"
                src="./assets/discover/image 13 (4).png"
                alt="Discover"
              />
            </div>
            <div class="category-card">
              <span class="category-name">Spotify Singles</span>
              <img
                class="card-image"
                src="./assets/discover/image 4.png"
                alt="Spotify Singles"
              />
            </div>
            <div class="category-card color-orange">
              <span class="category-name">Decades</span>
              <img
                class="card-image"
                src="./assets/discover/image 5.png"
                alt="Decades"
              />
            </div>
          </div>
          <div class="direction_icon">
            <h3 class="sub-title">Genres</h3>
            <img src="./assets/discover/Frame 76.png" alt="frame icons" />
          </div>
          <div class="cards_grid">
            <div class="category-card light-green-color">
              <span class="category-name">Pop</span>
              <img
                class="card-image"
                src="./assets/genres/image 13.png"
                alt="Pop"
              />
            </div>
            <div class="category-card red-orange-color">
              <span class="category-name">Country</span>
              <img
                class="card-image"
                src="./assets/genres/image 13 (1).png"
                alt="Country"
              />
            </div>
            <div class="category-card purple-color">
              <span class="category-name">Hip-Hop</span>
              <img
                class="card-image"
                src="./assets/genres/image 13 (2).png"
                alt="Hip-Hop"
              />
            </div>
            <div class="category-card green-color">
              <span class="category-name">Rock</span>
              <img
                class="card-image"
                src="./assets/genres/image 13 (3).png"
                alt="Rock"
              />
            </div>
            <div class="category-card red-color">
              <span class="category-name">Indie</span>
              <img
                class="card-image"
                src="./assets/genres/image 13 (4).png"
                alt="Indie"
              />
            </div>
            <div class="category-card color-blue">
              <span class="category-name">Punk</span>
              <img
                class="card-image"
                src="./assets/genres/image 13 (5).png"
                alt="Punk"
              />
            </div>
            <div class="category-card red-color">
              <span class="category-name">Metal</span>
              <img
                class="card-image"
                src="./assets/genres/image 15.png"
                alt="Metal"
              />
            </div>
            <div class="category-card color-blue">
              <span class="category-name">Instrumental</span>
              <img
                class="card-image"
                src="./assets/genres/image 14.png"
                alt="Instrumental"
              />
            </div>
          </div>
        </section>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
